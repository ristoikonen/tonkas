<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Custom Tailwind configurations for slick dark mode vibes
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lightBg: '#BEFFC7',
                        darkBg: '#E3E7D3',
                        cardBg: '#1e293b',
                        medBg: '#BDC2BF'
                    }
                }
            }
        }


        window.onload = function() {

            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                timeZone: 'Australia/Sydney'
                };

            // 1. Create a Date object
            const now = new Date();

            // 2. Format the date into a localized string
            const currentDateTime = now.toLocaleString('en-AU', options);

            // 3. Select the element
            const dateTimeElement = document.getElementById('datetime');

            // 4. Safely update the DOM text content if the element exists
            if (dateTimeElement) {
                dateTimeElement.textContent = currentDateTime;
            }
        };

    </script>
</head>
<body class="bg-darkBg text-slate-100 font-sans min-h-screen p-6 sm:p-10">


    <div class="max-w-7xl mx-auto"> 

   <main class="relative">
        <div id="crypto-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="animate-pulse bg-cardBg border border-slate-800 rounded-2xl p-6 h-48"></div>
            <div class="animate-pulse bg-cardBg border border-slate-800 rounded-2xl p-6 h-48"></div>
            <div class="animate-pulse bg-cardBg border border-slate-800 rounded-2xl p-6 h-48"></div>
        </div>

&copy; 2026 Tonkas
    </main>

       &copy; 2026 Tonkas Crypto Dashboard. Data by CoinLore API.
   </footer> -->
</div>
   <footer class="mt-12 pt-8 border-slate-800/30 text-gray-600  font-mono">
       &copy; 2026 Tonkas Crypto Dashboard. Data by CoinLore API. <div id="datetime"/>
   </footer>


    <script src="src/app.js"></script>
</body>
</html>
